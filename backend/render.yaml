services:
  - type: web
    name: prescription-reader-api
    env: python
    region: oregon          # change to: oregon | frankfurt | singapore | ohio
    plan: free              # free | starter | standard

    # Install system dependency (poppler for PDF support)
    buildCommand: |
      apt-get install -y poppler-utils &&
      pip install -r requirements.txt

    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /health

    envVars:
      - key: OPENAI_API_KEY
        sync: false         # ← Set manually in Render dashboard (never commit this)

      - key: PYTHONUNBUFFERED
        value: "1"

      - key: PORT
        value: "8000"